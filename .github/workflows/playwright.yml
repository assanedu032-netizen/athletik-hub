# ════════════════════════════════════════════════════════════════════════════
# Playwright smoke tests — Athletik Hub
# ────────────────────────────────────────────────────────────────────────────
# Tourne sur chaque push et chaque PR. Sert le repo en statique (python
# http.server, déjà dispo sur ubuntu-latest), puis lance les smoke tests
# Playwright (Pixel 5 + iPhone 13). Sur échec, on uploade le report HTML
# pour pouvoir investiguer sans relancer.
# ════════════════════════════════════════════════════════════════════════════
name: Playwright

on:
  push:
  pull_request:

jobs:
  test:
    name: Smoke tests (mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # Pas de lockfile committé pour l'instant → fallback npm install.
        # Quand un package-lock.json sera ajouté, ce step utilisera npm ci.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
