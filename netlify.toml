[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

# Embarque le livre dans le bundle de la fonction qui en a besoin
# (système RAG Titan-livre, main branch).
[functions."admin-build-index"]
  included_files = ["data/livre.md"]

# Embarque la banque de questions LDV_V1_STABLE_INTRO (pages stables du livre)
# pour la fonction d'activation post-achat. Le fichier n'est jamais servi au
# client — seul le bundle de la fonction y a accès.
[functions."book-challenge"]
  included_files = ["data/book-challenges.js"]

# Fonction planifiée : rappels session (H-60 lecture, H-30 prep, H+5 micro).
# Cron toutes les 10 minutes — chaque fenêtre fait 10 min de large pour
# n'envoyer qu'un seul push par utilisateur par fenêtre.
[functions."session-reminders"]
  schedule = "*/10 * * * *"

# Fonction planifiée : engagement de la semaine, lundi matin.
# Le cron tourne 1× par heure entre 6h et 10h UTC — la fonction filtre côté
# user pour ne pousser que ceux qui sont actuellement entre 8h et 9h LOCAL.
# Couvre les fuseaux UTC-2 à UTC+2 (Europe + Afrique de l'Ouest).
[functions."weekly-engagement"]
  schedule = "0 6-10 * * 1"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
